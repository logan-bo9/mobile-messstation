<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Mobile Messstation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #0f172a;
            color: white;
        }
        h1 {
            color: #38bdf8;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>📡 Mobile Messstation</h1>

<div class="box">
    <h2>Projektübersicht</h2>
    <p>Arduino-basierte Umwelt-Messstation zur Erfassung von Temperatur und Luftfeuchtigkeit.</p>
</div>

<div class="box">
    <h2>Funktionen</h2>
    <ul>
        <li>Temperaturmessung</li>
        <li>Luftfeuchtigkeit</li>
        <li>LCD Anzeige</li>
        <li>Erweiterbar (Alarm, Menüsystem)</li>
    </ul>
</div>

<div class="box">
    <h2>Status</h2>
    <p>🟡 In Entwicklung</p>
</div>

</body>
</html>
